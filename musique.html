<div style="
    background-image: url('1.jpeg'); 
    background-size: cover; 
    background-position: center; 
    min-height: 100vh; 
    display: flex; 
    flex-wrap: wrap; 
    align-content: flex-start; 
    justify-content: center; 
    gap: 15px; 
    padding: 20px;
">

   <body>

    <h3 id="currentTitle">اختر أغنية</h3>
    <audio id="player" controls autoplay style="transform: scale(1.5); transform-origin: left; margin: 20px;"></audio>
<div class="song-item" onclick="play('7','7.mp3')">7</div>
<div class="song-item" onclick="play('8','8.mp3')">8</div>
<div class="song-item" onclick="play('7','7.mp3')">7</div>
 <script>
        function play(name, url) {
            document.getElementById('currentTitle').innerText = name;
            const player = document.getElementById('player');
            player.src = url;
            player.play();
        }
    </script>

</body>   

</div>
