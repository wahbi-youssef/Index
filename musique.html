<div style="
    background-image: url('12.jpg'); 
    background-size: cover; 
    background-position: center; 
    min-height: 100vh; 
    display: flex; 
    flex-direction: column; /* ترتيب العناصر عمودياً */
    align-items: center; 
    justify-content: flex-start; 
    gap: 15px; 
    padding: 20px;
">
    <h3 id="currentTitle" style="color: white; font-family: sans-serif;">اختر أغنية</h3>
    
    <audio id="player" controls style="zoom: 3; margin: 20px;"></audio>

    <div style="display: flex; gap: 10px;">
     <div class="song-item" onclick="play('أغنية 1','1.mp3')" style="cursor: pointer; padding: 50px 50px; background: white; border-radius: 5px;">1</div>
     <div class="song-item" onclick="play('أغنية 2','2.mp3')" style="cursor: pointer; padding: 50px 50px; background: orange; border-radius: 5px;">2</div>
    <div class="song-item" onclick="play('أغنية 3','3.mp3')" style="cursor: pointer; padding: 50px 50px; background: red; border-radius: 5px;">3</div>
     <div class="song-item" onclick="play('أغنية 4','4.mp3')" style="cursor: pointer; padding: 50px 50px; background: white; border-radius: 5px;">4</div>
    <div class="song-item" onclick="play('أغنية 5','5.mp3')" style="cursor: pointer; padding: 50px 50px; background: orange; border-radius: 5px;">5</div>
     <div class="song-item" onclick="play('أغنية 6','6.mp3')" style="cursor: pointer; padding: 50px 50px; background: red; border-radius: 5px;">6</div>
    <div class="song-item" onclick="play('أغنية 7','7.mp3')" style="cursor: pointer; padding: 50px 50px; background: white; border-radius: 5px;">7</div>
     <div class="song-item" onclick="play('أغنية 8','8.mp3')" style="cursor: pointer; padding: 50px 50px; background: orange; border-radius: 5px;">8</div
        
        
    </div>

    <script>
    function play(title, source) {
        var player = document.getElementById('player');
        var titleElement = document.getElementById('currentTitle');
        
        // تحديث العنوان
        titleElement.innerText = "يعمل الآن: " + title;
        
        // تغيير المصدر
        player.src = source;
        
        // تحميل الملف الجديد وتشغيله
        player.load(); 
        player.play().catch(function(error) {
            console.log("التشغيل التلقائي محظور: يجب النقر على الصفحة أولاً.");
        });
    }
    </script>
</div>
