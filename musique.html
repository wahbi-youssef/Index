<div style="
    background-image: url('1.jpeg'); 
    background-size: cover; 
    background-position: center; 
    min-height: 100vh; 
    display: flex; 
    flex-wrap: wrap; 
    align-content: flex-start; 
    justify-content: center; 
    gap: 15px; 
    padding: 20px;
">

  <body>

    <h3 id="currentTitle">اختر أغنية</h3>
    <audio id="player" controls autoplay></audio>

<div class="song-item" onclick="play('أغنية 1', '111.mp3')">1 أغنية</div>
<div class="song-item" onclick="play('أغنية 2', '222.mp3')">أغنية 2</div>
<div class="song-item" onclick="play('أغنية 1', '333.mp3')">1 أغنية</div>
 <script>
        function play(name, url) {
            document.getElementById('currentTitle').innerText = name;
            const player = document.getElementById('player');
            player.src = url;
            player.play();
        }
    </script>

</body>   

</div>
